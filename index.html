    // Results Table
    calculateUsage && e('div', {style: {maxWidth: '900px', margin: '0 auto', animation: 'fadeIn 0.4s ease-out'}},
      e('div', {style: {background: 'linear-gradient(145deg, #1e293b, #0f172a)', borderRadius: '16px', border: '1px solid #334155', overflow: 'hidden', boxShadow: '0 20px 50px rgba(0,0,0,0.3)'}},
        e('div', {style: {padding: '20px 24px', borderBottom: '1px solid #334155', background: 'rgba(59, 130, 246, 0.05)'}},
          e('h2', {style: {fontSize: '20px', fontWeight: '600', margin: 0}},
            selectedPitcher,
            e('span', {style: {fontSize: '14px', fontWeight: '400', color: '#64748b', marginLeft: '12px'}}, 'vs ' + (selectedStand === 'R' ? 'Right' : 'Left') + '-Handed Hitters')
          )
        ),
        e('div', {style: {overflowX: 'auto'}},
          e('table', {style: {width: '100%', borderCollapse: 'collapse'}},
            e('thead', null,
              e('tr', {style: {background: '#0f172a'}},
                e('th', {style: {padding: '14px 20px', textAlign: 'left', fontSize: '12px', fontWeight: '600', color: '#94a3b8', textTransform: 'uppercase', letterSpacing: '0.05em'}}, 'Pitch Type'),
                Object.keys(COUNT_CATEGORIES).map(function(cat) {
                  return e('th', {key: cat, style: {padding: '14px 16px', textAlign: 'center', fontSize: '12px', fontWeight: '600', color: '#94a3b8', textTransform: 'uppercase', letterSpacing: '0.05em'}}, cat);
                })
              )
            ),
            e('tbody', null,
              Object.entries(calculateUsage).sort(function(a, b) {
                return Math.max(...Object.values(b[1])) - Math.max(...Object.values(a[1]));
              }).map(function([pitchCode, categories], idx) {
                return e('tr', {key: pitchCode, style: {borderBottom: '1px solid #1e293b', background: idx % 2 === 0 ? 'transparent' : 'rgba(30,41,59,0.3)'}},
                  e('td', {style: {padding: '14px 20px'}},
                    e('div', {style: {display: 'flex', alignItems: 'center', gap: '10px'}},
                      e('div', {style: {width: '10px', height: '10px', borderRadius: '50%', background: getPitchColor(pitchCode), boxShadow: '0 0 8px ' + getPitchColor(pitchCode) + '50'}}),
                      e('span', {style: {fontWeight: '600', fontSize: '14px'}}, pitchCode),
                      e('span', {style: {color: '#64748b', fontSize: '13px'}}, PITCH_NAMES[pitchCode] || pitchCode)
                    )
                  ),
                  Object.keys(COUNT_CATEGORIES).map(function(cat) {
                    const pct = categories[cat];
                    const bgColor = pct >= 50 ? 'rgba(34,197,94,0.15)' : pct >= 25 ? 'rgba(234,179,8,0.15)' : 'rgba(59,130,246,0.1)';
                    const textColor = pct >= 50 ? '#22c55e' : pct >= 25 ? '#eab308' : '#60a5fa';
                    return e('td', {key: cat, style: {padding: '14px 16px', textAlign: 'center'}},
                      e('span', {style: {display: 'inline-block', padding: '6px 14px', borderRadius: '8px', fontSize: '14px', fontWeight: '600', background: bgColor, color: textColor, minWidth: '52px'}}, pct + '%')
                    );
                  })
                );
              })
            )
          )
        )
      ),
      // Legend
      e('div', {style: {marginTop: '20px', display: 'flex', justifyContent: 'center', gap: '24px', flexWrap: 'wrap'}},
        e('div', {style: {display: 'flex', alignItems: 'center', gap: '8px', fontSize: '13px', color: '#64748b'}},
          e('div', {style: {width: '12px', height: '12px', borderRadius: '4px', background: 'rgba(34,197,94,0.15)', border: '1px solid #22c55e'}}),
          e('span', null, '≥50%')
        ),
        e('div', {style: {display: 'flex', alignItems: 'center', gap: '8px', fontSize: '13px', color: '#64748b'}},
          e('div', {style: {width: '12px', height: '12px', borderRadius: '4px', background: 'rgba(234,179,8,0.15)', border: '1px solid #eab308'}}),
          e('span', null, '≥25%')
        ),
        e('div', {style: {display: 'flex', alignItems: 'center', gap: '8px', fontSize: '13px', color: '#64748b'}},
          e('div', {style: {width: '12px', height: '12px', borderRadius: '4px', background: 'rgba(59,130,246,0.1)', border: '1px solid #60a5fa'}}),
          e('span', null, '<25%')
        )
      )
    ),
    // Empty State
    !calculateUsage && !loading2026 && e('div', {style: {maxWidth: '900px', margin: '0 auto', textAlign: 'center', padding: '60px 20px'}},
      e('div', {style: {fontSize: '48px', marginBottom: '16px'}}, '⚾'),
      e('p', {style: {color: '#64748b', fontSize: '16px'}},
        selectedYear === '2025'
          ? 'Search for a pitcher to analyze their pitch usage patterns'
          : pitchers.length === 0
            ? 'No qualified pitchers yet. Season data updates 6x daily.'
            : 'Search for a pitcher to analyze their 2026 data.'
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(PitchUsageAnalyzer));
</script>
</body>
</html>
