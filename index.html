<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch Usage by Count</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #0a0e1a;
    --bg-primary: #0f1525;
    --bg-card: #141b2d;
    --bg-card-alt: #182035;
    --bg-input: #1a2238;
    --border: #1e2a45;
    --border-light: #263354;
    --text-primary: #e8ecf4;
    --text-secondary: #8893a7;
    --text-muted: #556179;
    --accent-blue: #4e8cff;
    --accent-cyan: #38bdf8;
    --accent-purple: #a78bfa;
    --accent-green: #34d399;
    --accent-yellow: #fbbf24;
    --accent-orange: #fb923c;
    --accent-red: #f87171;
    --accent-pink: #f472b6;
    --glow-blue: rgba(78, 140, 255, 0.15);
  }

  .light-mode {
    --bg-deep: #f0f2f5;
    --bg-primary: #f5f6f8;
    --bg-card: #ffffff;
    --bg-card-alt: #f7f8fa;
    --bg-input: #edf0f4;
    --border: #d4d9e3;
    --border-light: #c5ccd8;
    --text-primary: #1a1f2e;
    --text-secondary: #555e70;
    --text-muted: #8892a4;
    --accent-blue: #3b7cef;
    --accent-cyan: #0ea5d6;
    --accent-green: #16a86a;
    --accent-red: #e54545;
    --glow-blue: rgba(59, 124, 239, 0.1);
  }

  .light-mode body::before { background: radial-gradient(ellipse, rgba(59,124,239,0.06) 0%, transparent 70%); }
  .light-mode h1 { background: linear-gradient(135deg, #1a1f2e 0%, #3b5998 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .light-mode .header-icon { box-shadow: 0 8px 32px rgba(59,124,239,0.2); }
  .light-mode .table-wrapper { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
  .light-mode .usage-neutral { background: rgba(85,97,121,0.08); color: var(--text-primary); }
  .light-mode .usage-high { background: rgba(22,168,106,0.12); color: var(--accent-green); }
  .light-mode .usage-low { background: rgba(229,69,69,0.1); color: var(--accent-red); }
  .light-mode .autocomplete { box-shadow: 0 12px 36px rgba(0,0,0,0.12); }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  body::before {
    content: '';
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 800px; height: 600px;
    background: radial-gradient(ellipse, rgba(78,140,255,0.08) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  .app { max-width: 1060px; margin: 0 auto; padding: 40px 24px 80px; position: relative; z-index: 1; }

  .header { text-align: center; margin-bottom: 40px; }
  .header-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
    border-radius: 16px; display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 20px; box-shadow: 0 8px 32px rgba(78,140,255,0.25);
  }
  .header-icon svg { width: 28px; height: 28px; fill: white; }
  h1 {
    font-size: 2.4rem; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 8px;
    background: linear-gradient(135deg, #fff 0%, #c0cfee 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .subtitle { color: var(--text-secondary); font-size: 1.05rem; font-weight: 400; }

  .controls { display: flex; gap: 12px; margin-bottom: 16px; }
  .search-wrapper { flex: 1; position: relative; }
  .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
  .search-input {
    width: 100%; padding: 16px 20px 16px 50px;
    background: var(--bg-input); border: 1.5px solid var(--border); border-radius: 14px;
    color: var(--text-primary); font-family: 'Outfit', sans-serif;
    font-size: 1rem; font-weight: 500; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.3s;
  }
  .search-input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px var(--glow-blue); }
  .search-input::placeholder { color: var(--text-muted); }

  .autocomplete {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--bg-card); border: 1.5px solid var(--border-light); border-radius: 12px;
    max-height: 260px; overflow-y: auto; z-index: 100;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5); display: none; transition: background 0.3s;
  }
  .autocomplete.active { display: block; }
  .autocomplete-item {
    padding: 12px 20px; cursor: pointer; font-size: 0.95rem; font-weight: 500;
    color: var(--text-secondary); transition: background 0.12s, color 0.12s;
    border-bottom: 1px solid var(--border);
  }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover, .autocomplete-item.highlighted { background: var(--glow-blue); color: var(--text-primary); }
  .autocomplete-item mark { background: none; color: var(--accent-cyan); font-weight: 700; }

  .styled-select { position: relative; min-width: 160px; }
  .styled-select select {
    width: 100%; appearance: none; padding: 16px 44px 16px 20px;
    background: var(--bg-input); border: 1.5px solid var(--border); border-radius: 14px;
    color: var(--text-primary); font-family: 'Outfit', sans-serif;
    font-size: 1rem; font-weight: 500; cursor: pointer; outline: none;
    transition: border-color 0.2s, background 0.3s, color 0.3s;
  }
  .styled-select select:focus { border-color: var(--accent-blue); }
  .styled-select::after {
    content: ''; position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
    border-left: 5px solid transparent; border-right: 5px solid transparent;
    border-top: 6px solid var(--text-muted); pointer-events: none;
  }

  .compare-row { display: flex; gap: 12px; align-items: center; margin-bottom: 40px; flex-wrap: wrap; }
  .compare-toggle {
    display: flex; align-items: center; gap: 10px; cursor: pointer; user-select: none;
    padding: 10px 18px; background: var(--bg-input); border: 1.5px solid var(--border);
    border-radius: 14px; color: var(--text-secondary); font-size: 0.92rem; font-weight: 500;
    transition: border-color 0.2s, color 0.2s, background 0.3s; white-space: nowrap;
  }
  .compare-toggle:hover { border-color: var(--border-light); color: var(--text-primary); }
  .compare-toggle.active { border-color: var(--accent-blue); color: var(--accent-cyan); }
  .compare-toggle .toggle-track {
    width: 36px; height: 20px; border-radius: 10px;
    background: var(--border); position: relative; transition: background 0.2s; flex-shrink: 0;
  }
  .compare-toggle.active .toggle-track { background: var(--accent-blue); }
  .compare-toggle .toggle-thumb {
    width: 16px; height: 16px; border-radius: 50%; background: white;
    position: absolute; top: 2px; left: 2px; transition: left 0.2s;
  }
  .compare-toggle.active .toggle-thumb { left: 18px; }
  .compare-selects { display: flex; gap: 12px; flex-wrap: wrap; }
  .compare-selects.hidden { display: none; }

  .player-card { animation: fadeSlideIn 0.35s ease-out; }
  @keyframes fadeSlideIn { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .player-header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid var(--border);
  }
  .player-avatar {
    width: 56px; height: 56px; border-radius: 14px;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue));
    display: flex; align-items: center; justify-content: center;
    font-size: 1.4rem; font-weight: 800; color: white; flex-shrink: 0;
  }
  .player-name { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.02em; }
  .player-sub { color: var(--text-secondary); font-size: 0.95rem; margin-top: 2px; }

  .compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .table-section-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem; font-weight: 600; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--accent-cyan); margin-bottom: 12px; padding-left: 4px;
  }

  .table-wrapper {
    background: var(--bg-card); border: 1.5px solid var(--border);
    border-radius: 16px; overflow: hidden;
    box-shadow: 0 4px 24px rgba(0,0,0,0.2); transition: background 0.3s, border-color 0.3s;
  }
  .pitch-table { width: 100%; border-collapse: collapse; }
  .pitch-table thead th {
    padding: 16px 14px; font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--accent-cyan);
    text-align: center; background: var(--bg-card-alt);
    border-bottom: 1.5px solid var(--border); transition: background 0.3s;
  }
  .pitch-table thead th:first-child { text-align: left; padding-left: 20px; }
  .pitch-table tbody tr { border-bottom: 1px solid var(--border); transition: background 0.15s; }
  .pitch-table tbody tr:last-child { border-bottom: none; }
  .pitch-table tbody tr:hover { background: rgba(78,140,255,0.04); }
  .pitch-table td { padding: 14px 14px; text-align: center; font-size: 0.9rem; font-weight: 500; }
  .pitch-table td:first-child { text-align: left; padding-left: 20px; font-weight: 600; }
  .pitch-type-cell { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
  .pitch-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .usage-badge {
    display: inline-block; padding: 5px 12px; border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem; font-weight: 600; min-width: 48px;
  }
  .usage-high    { background: rgba(52,211,153,0.15); color: var(--accent-green); }
  .usage-low     { background: rgba(248,113,113,0.12); color: var(--accent-red); }
  .usage-neutral { background: rgba(85,97,121,0.15); color: #ffffff; }
  .light-mode .usage-neutral { color: var(--text-primary); }

  .definitions {
    margin-top: 24px; background: var(--bg-card); border: 1.5px solid var(--border);
    border-radius: 16px; overflow: hidden; transition: background 0.3s, border-color 0.3s;
  }
  .definitions-toggle {
    width: 100%; padding: 18px 24px; background: none; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: space-between;
    font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted);
  }
  .definitions-toggle:hover { color: var(--text-secondary); }
  .definitions-arrow { transition: transform 0.25s; font-size: 0.8rem; }
  .definitions.open .definitions-arrow { transform: rotate(180deg); }
  .definitions-body {
    max-height: 0; overflow: hidden;
    transition: max-height 0.3s ease, padding 0.3s ease; padding: 0 24px;
  }
  .definitions.open .definitions-body { max-height: 400px; padding: 0 24px 20px; }
  .definitions-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px 32px; }
  .def-item { font-size: 0.88rem; color: var(--text-secondary); }
  .def-label { font-weight: 600; color: var(--text-secondary); }
  .def-divider { grid-column: 1 / -1; border-top: 1px solid var(--border); margin: 8px 0; }
  .def-highlight { font-size: 0.86rem; color: var(--text-secondary); line-height: 1.5; grid-column: 1 / -1; }
  .def-highlight .green-text { color: var(--accent-green); font-weight: 600; }
  .def-highlight .red-text { color: var(--accent-red); font-weight: 600; }

  .theme-toggle-wrapper { margin-top: 20px; text-align: center; }
  .theme-toggle-btn {
    display: inline-flex; align-items: center; gap: 10px; cursor: pointer; user-select: none;
    padding: 10px 20px; background: var(--bg-input); border: 1.5px solid var(--border);
    border-radius: 14px; color: var(--text-secondary); font-family: 'Outfit', sans-serif;
    font-size: 0.88rem; font-weight: 500; transition: border-color 0.2s, color 0.2s, background 0.3s;
  }
  .theme-toggle-btn:hover { border-color: var(--border-light); color: var(--text-primary); }
  .theme-icon { font-size: 1.1rem; }

  .empty-state { text-align: center; padding: 80px 20px; color: var(--text-muted); }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state p { font-size: 1.05rem; }
  .loading { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--accent-blue); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 768px) {
    .controls { flex-direction: column; }
    .compare-row { flex-direction: column; }
    .compare-grid { grid-template-columns: 1fr; }
    h1 { font-size: 1.8rem; }
    .definitions-grid { grid-template-columns: 1fr; }
    .pitch-table thead th, .pitch-table td { padding: 10px 6px; font-size: 0.72rem; }
    .usage-badge { padding: 4px 6px; font-size: 0.7rem; min-width: 36px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
    </div>
    <h1>Pitch Usage by Count</h1>
    <p class="subtitle">Analyze how pitchers attack hitters in different count situations</p>
  </div>

  <div class="controls">
    <div class="search-wrapper">
      <div class="search-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <input type="text" class="search-input" id="searchInput" placeholder="Search pitcher name..." autocomplete="off">
      <div class="autocomplete" id="autocomplete"></div>
    </div>
    <div class="styled-select">
      <select id="handSelect">
        <option value="R">vs RHH</option>
        <option value="L">vs LHH</option>
      </select>
    </div>
  </div>

  <div class="compare-row" id="compareRow" style="display:none;">
    <div class="compare-toggle" id="compareToggle">
      <span>Compare</span>
      <div class="toggle-track"><div class="toggle-thumb"></div></div>
    </div>
    <div class="compare-selects hidden" id="compareSelects">
      <div class="styled-select">
        <select id="compareTypeSelect">
          <option value="monthly">By Month</option>
          <option value="split_season">Split Season</option>
          <option value="allstar_break">Pre and Post All-Star Break</option>
        </select>
      </div>
      <div class="styled-select" id="monthSelectA_wrapper">
        <select id="monthSelectA"></select>
      </div>
      <div class="styled-select" id="monthSelectB_wrapper">
        <select id="monthSelectB"></select>
      </div>
    </div>
  </div>

  <div id="content">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      <p>Search for a pitcher to see their pitch usage breakdown</p>
    </div>
  </div>

  <div id="bottomControls" style="display:none;">
    <div class="theme-toggle-wrapper">
      <div class="theme-toggle-btn" id="themeToggle">
        <span class="theme-icon">☀️</span>
        <span id="themeLabel">Light Mode</span>
      </div>
    </div>
  </div>
</div>

<script>
const PITCH_COLORS = {
  "FF": "#ef4444", "SI": "#f97316", "CH": "#22c55e", "FS": "#14b8a6",
  "FC": "#92400e", "SL": "#facc15", "ST": "#b8860b", "CU": "#38bdf8",
  "KC": "#a855f7", "SV": "#8fa3b8", "KN": "#94a3b8", "EP": "#6ee7b7",
  "SC": "#fca5a5", "CS": "#67e8f9", "FO": "#fdba74", "FA": "#ef4444",
};

const PITCH_NAMES = {
  "FF": "4-Seam Fastball", "SI": "Sinker", "FC": "Cutter", "SL": "Slider",
  "CU": "Curveball", "CH": "Changeup", "FS": "Splitter", "KC": "Knuckle Curve",
  "ST": "Sweeper", "SV": "Slurve", "KN": "Knuckleball", "EP": "Eephus",
  "SC": "Screwball", "CS": "Slow Curve", "FO": "Forkball", "FA": "Fastball",
};

const PITCH_ORDER = ["FF","SI","FC","FA","SL","ST","SV","CU","KC","CS","CH","FS","FO","SC","KN","EP"];
const CATEGORIES = ["all_counts","early_count","pitcher_ahead","pitcher_behind","pre_two_strikes"];

let DATA = null;
let selectedPitcher = null;
let highlightIndex = -1;
let compareActive = false;
let isLightMode = false;

const searchInput = document.getElementById("searchInput");
const autocomplete = document.getElementById("autocomplete");
const handSelect = document.getElementById("handSelect");
const content = document.getElementById("content");
const compareRow = document.getElementById("compareRow");
const compareToggle = document.getElementById("compareToggle");
const compareSelects = document.getElementById("compareSelects");
const compareTypeSelect = document.getElementById("compareTypeSelect");
const monthSelectA = document.getElementById("monthSelectA");
const monthSelectB = document.getElementById("monthSelectB");
const monthSelectA_wrapper = document.getElementById("monthSelectA_wrapper");
const monthSelectB_wrapper = document.getElementById("monthSelectB_wrapper");
const bottomControls = document.getElementById("bottomControls");
const themeToggle = document.getElementById("themeToggle");
const themeLabel = document.getElementById("themeLabel");

async function loadData() {
  content.innerHTML = `<div class="loading"><div class="spinner"></div><p>Loading pitch data...</p></div>`;
  try {
    const resp = await fetch("pitch_usage_data.json");
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    DATA = await resp.json();
    content.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
        <p>Search for a pitcher to see their pitch usage breakdown</p>
      </div>`;
  } catch (err) {
    content.innerHTML = `
      <div class="empty-state">
        <p style="color: var(--accent-red);">Could not load pitch_usage_data.json</p>
        <p style="margin-top:8px; font-size:0.88rem;">Make sure the JSON file is in the same folder as this HTML file.<br>
        Run <code style="background:var(--bg-input);padding:2px 8px;border-radius:4px;">python3 prepare_pitch_data.py</code> first.</p>
      </div>`;
  }
}

// ─── Search ──────────────────────────────────────────────────────────────────
function getFilteredPitchers(query) {
  if (!DATA || !query.trim()) return [];
  const q = query.toLowerCase().trim();
  return DATA.pitchers.filter(name => {
    const lower = name.toLowerCase();
    if (lower.includes(q)) return true;
    const parts = q.split(/\s+/);
    if (parts.length === 2) {
      if (lower.includes(`${parts[1]}, ${parts[0]}`)) return true;
      if (lower.includes(`${parts[0]}, ${parts[1]}`)) return true;
    }
    return false;
  }).slice(0, 12);
}

function highlightMatch(name, query) {
  const q = query.toLowerCase().trim();
  const idx = name.toLowerCase().indexOf(q);
  if (idx === -1) return name;
  return name.slice(0, idx) + `<mark>${name.slice(idx, idx + q.length)}</mark>` + name.slice(idx + q.length);
}

function showAutocomplete() {
  const query = searchInput.value;
  const matches = getFilteredPitchers(query);
  highlightIndex = -1;
  if (!matches.length) { autocomplete.classList.remove("active"); return; }
  autocomplete.innerHTML = matches.map((name, i) =>
    `<div class="autocomplete-item" data-index="${i}" data-name="${name}">${highlightMatch(name, query)}</div>`
  ).join("");
  autocomplete.classList.add("active");
  autocomplete.querySelectorAll(".autocomplete-item").forEach(item => {
    item.addEventListener("click", () => selectPitcher(item.dataset.name));
  });
}

function selectPitcher(name) {
  selectedPitcher = name;
  searchInput.value = name;
  autocomplete.classList.remove("active");
  compareRow.style.display = "flex";
  bottomControls.style.display = "block";
  populateCompareSelects();
  renderResults();
}

searchInput.addEventListener("input", showAutocomplete);
searchInput.addEventListener("focus", () => { if (searchInput.value) showAutocomplete(); });
searchInput.addEventListener("keydown", (e) => {
  const items = autocomplete.querySelectorAll(".autocomplete-item");
  if (!items.length) return;
  if (e.key === "ArrowDown") { e.preventDefault(); highlightIndex = Math.min(highlightIndex + 1, items.length - 1); items.forEach((el, i) => el.classList.toggle("highlighted", i === highlightIndex)); }
  else if (e.key === "ArrowUp") { e.preventDefault(); highlightIndex = Math.max(highlightIndex - 1, 0); items.forEach((el, i) => el.classList.toggle("highlighted", i === highlightIndex)); }
  else if (e.key === "Enter") { e.preventDefault(); if (highlightIndex >= 0 && items[highlightIndex]) selectPitcher(items[highlightIndex].dataset.name); }
  else if (e.key === "Escape") autocomplete.classList.remove("active");
});
document.addEventListener("click", (e) => { if (!e.target.closest(".search-wrapper")) autocomplete.classList.remove("active"); });
handSelect.addEventListener("change", () => { if (selectedPitcher) { populateCompareSelects(); renderResults(); } });

// ─── Compare ─────────────────────────────────────────────────────────────────
compareToggle.addEventListener("click", () => {
  compareActive = !compareActive;
  compareToggle.classList.toggle("active", compareActive);
  compareSelects.classList.toggle("hidden", !compareActive);
  renderResults();
});

compareTypeSelect.addEventListener("change", () => { updateCompareUI(); renderResults(); });
monthSelectA.addEventListener("change", renderResults);
monthSelectB.addEventListener("change", renderResults);

function populateCompareSelects() {
  const hand = handSelect.value;
  const key = `${selectedPitcher}|${hand}`;
  const entry = DATA?.data?.[key];
  if (!entry) return;
  const monthly = entry.monthly || {};
  const months = Object.keys(monthly).sort((a, b) => parseInt(a) - parseInt(b));
  monthSelectA.innerHTML = months.map(m => `<option value="${m}">${monthly[m].label}</option>`).join("");
  monthSelectB.innerHTML = months.map(m => `<option value="${m}">${monthly[m].label}</option>`).join("");
  if (months.length >= 2) monthSelectB.value = months[1];
  updateCompareUI();
}

function updateCompareUI() {
  const type = compareTypeSelect.value;
  const showMonths = type === "monthly";
  monthSelectA_wrapper.style.display = showMonths ? "" : "none";
  monthSelectB_wrapper.style.display = showMonths ? "" : "none";
}

// ─── Theme ───────────────────────────────────────────────────────────────────
themeToggle.addEventListener("click", () => {
  isLightMode = !isLightMode;
  document.documentElement.classList.toggle("light-mode", isLightMode);
  themeLabel.textContent = isLightMode ? "Dark Mode" : "Light Mode";
  themeToggle.querySelector(".theme-icon").textContent = isLightMode ? "🌙" : "☀️";
});

// ─── Render ──────────────────────────────────────────────────────────────────

// Standard mode: color relative to all_counts baseline
function getUsageClass(val, baseline, isAllCounts) {
  if (isAllCounts) return "usage-neutral";
  const diff = val - baseline;
  if (diff >= 5) return "usage-high";
  if (diff <= -5) return "usage-low";
  return "usage-neutral";
}

// Compare mode (second box): color relative to the first box's value for same pitch + category
function getCompareUsageClass(val, refVal) {
  const diff = val - refVal;
  if (diff >= 5) return "usage-high";
  if (diff <= -5) return "usage-low";
  return "usage-neutral";
}

function getPitchTypes(pitchData) {
  return Object.keys(pitchData)
    .filter(pt => (pitchData[pt]?.["all_counts"] ?? 0) >= 2)
    .sort((a, b) => {
      const ai = PITCH_ORDER.indexOf(a);
      const bi = PITCH_ORDER.indexOf(b);
      return (ai === -1 ? 99 : ai) - (bi === -1 ? 99 : bi);
    });
}

// mode: "standard" = color vs all_counts, "neutral" = no coloring, "compare" = color vs reference data
function buildTable(pitchData, label, mode, refData) {
  if (!pitchData || !Object.keys(pitchData).length) {
    return `<div class="empty-state" style="padding:40px;"><p>No data available</p></div>`;
  }
  const pitchTypes = getPitchTypes(pitchData);
  if (!pitchTypes.length) {
    return `<div class="empty-state" style="padding:40px;"><p>No pitches above 2% usage</p></div>`;
  }

  const rows = pitchTypes.map(pt => {
    const name = PITCH_NAMES[pt] || pt;
    const color = PITCH_COLORS[pt] || "#94a3b8";
    const cells = CATEGORIES.map(cat => {
      const val = pitchData[pt]?.[cat] ?? 0;
      let cls = "usage-neutral";

      if (mode === "standard") {
        const baseline = pitchData[pt]?.["all_counts"] ?? 0;
        cls = getUsageClass(val, baseline, cat === "all_counts");
      } else if (mode === "compare" && refData) {
        const refVal = refData[pt]?.[cat] ?? 0;
        cls = getCompareUsageClass(val, refVal);
      }
      // mode === "neutral" keeps cls as "usage-neutral"

      return `<td><span class="usage-badge ${cls}">${val > 0 ? val + "%" : "—"}</span></td>`;
    }).join("");
    return `<tr>
      <td><div class="pitch-type-cell"><span class="pitch-dot" style="background:${color}"></span>${name}</div></td>
      ${cells}
    </tr>`;
  }).join("");

  let html = "";
  if (label) html += `<div class="table-section-label">${label}</div>`;
  html += `<div class="table-wrapper">
    <table class="pitch-table">
      <thead><tr>
        <th>Pitch Type</th><th>All Counts</th><th>Early Count</th>
        <th>Pitcher Ahead</th><th>Pitcher Behind</th><th>Pre Two Strikes</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
  return html;
}

function renderResults() {
  if (!DATA || !selectedPitcher) return;

  const hand = handSelect.value;
  const key = `${selectedPitcher}|${hand}`;
  const entry = DATA.data[key];

  const handLabel = hand === "R" ? "Right-Handed Hitters" : "Left-Handed Hitters";
  const initials = selectedPitcher.split(",")[0]?.trim()[0] || "?";
  const nameParts = selectedPitcher.split(",").map(s => s.trim());
  const displayName = nameParts.length === 2 ? `${nameParts[1]} ${nameParts[0]}` : selectedPitcher;

  if (!entry) {
    content.innerHTML = `
      <div class="player-card">
        <div class="player-header">
          <div class="player-avatar">${initials}</div>
          <div><div class="player-name">${displayName}</div>
          <div class="player-sub">Pitch Mix vs ${handLabel}</div></div>
        </div>
        <div class="empty-state" style="padding:40px;">
          <p>No data available for this pitcher vs ${hand === "R" ? "right" : "left"}-handed hitters</p>
        </div>
      </div>`;
    return;
  }

  let tablesHTML = "";

  if (compareActive) {
    const compareType = compareTypeSelect.value;
    let firstData = null, secondData = null, firstLabel = "", secondLabel = "";

    if (compareType === "split_season") {
      const ss = entry.split_season || {};
      firstData = ss.first?.data;
      secondData = ss.second?.data;
      firstLabel = ss.first?.label || "First Half";
      secondLabel = ss.second?.label || "Second Half";
    } else if (compareType === "allstar_break") {
      const ab = entry.allstar_break || {};
      firstData = ab.first?.data;
      secondData = ab.second?.data;
      firstLabel = ab.first?.label || "Pre All-Star Break";
      secondLabel = ab.second?.label || "Post All-Star Break";
    } else {
      const monthly = entry.monthly || {};
      const mA = monthSelectA.value;
      const mB = monthSelectB.value;
      firstData = monthly[mA]?.data;
      secondData = monthly[mB]?.data;
      firstLabel = monthly[mA]?.label || "Month A";
      secondLabel = monthly[mB]?.label || "Month B";
    }

    // First box: neutral (no coloring). Second box: colored relative to first box.
    tablesHTML = `<div class="compare-grid">
      <div>${buildTable(firstData, firstLabel, "neutral", null)}</div>
      <div>${buildTable(secondData, secondLabel, "compare", firstData)}</div>
    </div>`;
  } else {
    tablesHTML = buildTable(entry.season, null, "standard", null);
  }

  const notes = `
    <div class="definitions" id="definitions">
      <button class="definitions-toggle" onclick="document.getElementById('definitions').classList.toggle('open')">
        <span>Notes and Details</span>
        <span class="definitions-arrow">▼</span>
      </button>
      <div class="definitions-body">
        <div class="definitions-grid">
          <div class="def-item"><span class="def-label">Early Count:</span> 0-0, 0-1, 1-0</div>
          <div class="def-item"><span class="def-label">Pitcher Ahead:</span> 0-1, 0-2, 1-2, 2-2</div>
          <div class="def-item"><span class="def-label">Pitcher Behind:</span> 1-0, 2-0, 3-0, 2-1, 3-1</div>
          <div class="def-item"><span class="def-label">Pre Two Strikes:</span> 0-0, 0-1, 1-0, 1-1, 2-1, 3-1</div>
          <div class="def-divider"></div>
          <div class="def-highlight">
            <span class="red-text">Red Highlight:</span> 5 percentage points or greater below "All Counts" usage for a specific pitch.<br>
            <span class="green-text">Green Highlight:</span> 5 percentage points or greater above "All Counts" usage for a specific pitch.<br><br>
            When the "Compare" toggle is selected, the red and green highlighting is relative to the earlier period, signifying a change in approach.
          </div>
        </div>
      </div>
    </div>`;

  content.innerHTML = `
    <div class="player-card">
      <div class="player-header">
        <div class="player-avatar">${initials}</div>
        <div><div class="player-name">${displayName}</div>
        <div class="player-sub">Pitch Mix vs ${handLabel}</div></div>
      </div>
      ${tablesHTML}
      ${notes}
    </div>`;
}

loadData();
</script>
</body>
</html>
